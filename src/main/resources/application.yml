# ============================================================================
# application.yml — Configuração central da aplicação Spring Boot
# ----------------------------------------------------------------------------
# Equivale ao .env + config/*.php (Laravel) ou settings.py (Django).
# O Spring lê este arquivo na inicialização e injeta os valores onde preciso.
# ============================================================================

server:
  # Exigência do desafio: a aplicação roda na porta 8082.
  port: 8082

spring:
  application:
    name: desafio-clientes

  # ---- Banco de dados H2 (em memória) -------------------------------------
  datasource:
    # "jdbc:h2:mem:clientesdb" = banco em memória chamado "clientesdb".
    # DB_CLOSE_DELAY=-1 mantém o banco vivo enquanto a aplicação rodar.
    url: jdbc:h2:mem:clientesdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # ---- JPA / Hibernate ----------------------------------------------------
  jpa:
    hibernate:
      # "update": o Hibernate cria/atualiza as tabelas a partir das entidades.
      # Prático para o desafio (não precisamos escrever SQL de criação).
      ddl-auto: update
    show-sql: true            # loga as queries SQL geradas (didático/debug)
    properties:
      hibernate:
        format_sql: true      # formata o SQL no log para ficar legível

  # ---- Console web do H2 --------------------------------------------------
  # Permite inspecionar o banco pelo navegador em /h2-console.
  h2:
    console:
      enabled: true
      path: /h2-console

# ---- Integração externa: ViaCEP ------------------------------------------
# URL base da API pública de CEPs. Fica em config para facilitar troca/mocks.
viacep:
  base-url: https://viacep.com.br/ws

# ---- Swagger / OpenAPI ----------------------------------------------------
springdoc:
  swagger-ui:
    path: /swagger-ui.html    # endereço da interface visual da documentação

# ---- Logging --------------------------------------------------------------
logging:
  level:
    com.bolt.clientes: DEBUG  # logs detalhados do nosso código
